<div class="container">

    <div class="form-box">

        <div class="button-box">
            <button id="loginBtn" class="toggle-btn active">ورود</button>
            <button id="signupBtn" class="toggle-btn">عضویت</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="form active">
            <h2>ورود</h2>
            <input type="text" placeholder="نام کاربری" required>
            <input type="password" placeholder="رمز عبور" required>
            <button type="submit" class="submit-btn">ورود</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="form">
            <h2>عضویت</h2>
            <input type="text" placeholder="نام کاربری" required>
            <input type="email" placeholder="ایمیل" required>
            <input type="password" placeholder="رمز عبور" required>
            <button type="submit" class="submit-btn">ثبت نام</button>
        </form>

    </div>
</div>

<script src="js.js"></script>
