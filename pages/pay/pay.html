<div class="wrapper">

    <!-- باکس پرداخت شهریه -->
    <div class="card">
        <h2>پرداخت شهریه</h2>

        <select id="month">
            <option value="">انتخاب ماه</option>
            <option>فروردین</option>
            <option>اردیبهشت</option>
            <option>خرداد</option>
            <option>تیر</option>
            <option>مرداد</option>
            <option>شهریور</option>
            <option>مهر</option>
            <option>آبان</option>
            <option>آذر</option>
            <option>دی</option>
            <option>بهمن</option>
            <option>اسفند</option>
        </select>

        <select id="year">
            <option value="">انتخاب سال</option>
            <option>1403</option>
            <option>1404</option>
            <option>1405</option>
        </select>

        <button id="payTuition">پرداخت شهریه 💳</button>
        <p class="msg" id="tuitionMsg"></p>
    </div>

    <!-- باکس برنامه -->
    <div class="card">
        <h2>دریافت برنامه تمرینی</h2>

        <div class="row">
            <input type="number" placeholder="قد (cm)">
            <input type="number" placeholder="وزن (kg)">
        </div>

        <div class="row">
            <input type="number" placeholder="سن">
            <input type="number" placeholder="وزن هدف">
        </div>

        <select>
            <option value="">انتخاب جنسیت</option>
            <option>مرد</option>
            <option>زن</option>
        </select>

        <select>
            <option value="">مربی موردنظر</option>
            <option>علی</option>
            <option>پارسا</option>
            <option>مانی</option>
            <option>آیدا</option>
        </select>

<label for="imgInput" class="uploadLabel" id="uploadBtn">
    انتخاب عکس
</label>

<input type="file" id="imgInput" accept="image/*">


        <button id="payProgram">پرداخت و دریافت برنامه 📝</button>
        <p class="msg" id="programMsg"></p>

    </div>

</div>

<script src="js.js"></script>
